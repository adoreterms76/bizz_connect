<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Business - BizConnect Botswana</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>BizConnect Botswana</h1>

<nav>
<a href="index.html">Home</a>
<a href="#">Find Services</a>
<a href="#">Marketplace</a>
<a href="register.html">Register Business</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="form-section">

<h2>Register Your Business</h2>
<p>Join our platform and connect with customers across Botswana.</p>

<form class="business-form">

<label>Business Name</label>
<input type="text" placeholder="Enter business name" required>

<label>Owner Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Email</label>
<input type="email" placeholder="Enter email address" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number" required>

<label>Business Category</label>
<select required>
<option>Hairdresser</option>
<option>Mechanic</option>
<option>Tutor</option>
<option>Photographer</option>
<option>Plumber</option>
<option>Other</option>
</select>

<label>Location</label>
<input type="text" placeholder="City / Town">

<label>Business Description</label>
<textarea placeholder="Describe your services"></textarea>

<button type="submit">Register Business</button>

</form>

</section>

<footer>
<p>© 2026 BizConnect Botswana</p>
</footer>

</body>
</html>
